name: Daily MACD Stock Scan

on:
  schedule:
    # 北京时间 9:00 = UTC 1:00 (冬令时) 或 UTC 0:00 (夏令时)
    # 使用 UTC 1:00 作为标准时间（大部分时间有效）
    - cron: '0 1 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy tushare sqlalchemy psycopg2-binary

      - name: Run daily scan and send to WeChat
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          cd MACD_Stock_Strategy
          python send_to_wechat.py
